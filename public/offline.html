<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030712" />
    <title>Closed Circuit | Offline</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030712;
        --panel: rgba(15, 23, 42, 0.88);
        --border: rgba(255, 255, 255, 0.12);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #8b5cf6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(99, 102, 241, 0.35), transparent 35%),
          radial-gradient(circle at bottom, rgba(168, 85, 247, 0.25), transparent 35%),
          var(--bg);
        color: var(--text);
      }

      main {
        width: min(100%, 540px);
        padding: 32px;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(14px);
        box-shadow: 0 24px 80px rgba(2, 6, 23, 0.45);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border-radius: 999px;
        background: rgba(139, 92, 246, 0.12);
        color: #c4b5fd;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        margin: 20px 0 12px;
        font-size: clamp(2rem, 4vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      a {
        display: inline-flex;
        margin-top: 24px;
        padding: 12px 18px;
        border-radius: 999px;
        color: #fff;
        text-decoration: none;
        font-weight: 700;
        background: linear-gradient(135deg, #6366f1, var(--accent));
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Offline Mode</div>
      <h1>Closed Circuit is temporarily offline.</h1>
      <p>
        The app shell is still available, but this page needs a network connection before it can refresh with the
        latest content. Reconnect and try again.
      </p>
      <a href="/">Try again</a>
    </main>
  </body>
  </html>
